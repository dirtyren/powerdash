name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm format:check

      - run: pnpm test

      - run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start mock-api (wiremock)
        run: |
          docker run -d --name mock-api \
            -p 8080:8080 \
            -v "$PWD/docker/wiremock/mappings:/home/wiremock/mappings:ro" \
            -v "$PWD/docker/wiremock/__files:/home/wiremock/__files:ro" \
            wiremock/wiremock:3.9.1 --global-response-templating

      - name: Wait for mock-api readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/__admin > /dev/null; then
              echo "mock-api ready"
              exit 0
            fi
            sleep 1
          done
          echo "mock-api failed to start"
          docker logs mock-api || true
          exit 1

      - name: Playwright e2e
        env:
          SEAGULL_BASE_URL: http://localhost:8080
        run: pnpm e2e

      - name: Teardown mock-api
        if: always()
        run: docker rm -f mock-api || true
