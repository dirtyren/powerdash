name: dashboard-html

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    container_name: powerdash-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://powerdash:powerdash@postgres:5432/powerdash
      - PROMETHEUS_BASE_URL=http://prometheus:9090
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: powerdash-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=6h
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: powerdash-postgres
    environment:
      - POSTGRES_USER=powerdash
      - POSTGRES_PASSWORD=powerdash
      - POSTGRES_DB=powerdash
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powerdash"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
